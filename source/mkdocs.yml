site_name: Ngoc Truong
site_author: Chu Ngoc Truong
site_description: >-
  Personal portfolio and laboratory works of Chu Ngoc Truong,
  Software Engineering student at ITMO University.
site_url: https://ngoctruong22.github.io/

repo_name: ngoctruong22
repo_url: https://github.com/ngoctruong22

copyright: Copyright &copy; 2025 Chu Ngoc Truong

# ─── THEME ──────────────────────────────────────────────────────────
theme:
  name: material
  language: en

  # Fonts
  font:
    text: DM Sans
    code: JetBrains Mono

  # Favicon & logo (replace with your own assets if available)
  # logo: assets/logo.svg
  # favicon: assets/favicon.png

  # Dark / Light mode toggle
  palette:
    # Light mode
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  features:
    # Navigation — sidebar shows Home → About Me → Laboratory Works in order
    - navigation.instant          # SPA-style instant page loads
    - navigation.instant.progress # Loading progress bar
    - navigation.tracking         # URL updates on scroll
    - navigation.sections         # Render top-level items as sections
    - navigation.expand           # Auto-expand active section
    - navigation.indexes          # Allow section index pages
    - navigation.top              # Back-to-top button
    - navigation.footer           # Previous / Next links in footer
    # NOTE: navigation.tabs and toc.integrate are intentionally omitted
    # so the left sidebar preserves the exact nav order without conflicts.

    # Search
    - search.highlight            # Highlight search terms
    - search.suggest              # Autocomplete suggestions
    - search.share                # Shareable search links

    # Table of contents (right-side only, not merged into left nav)
    - toc.follow                  # TOC auto-scrolls with page

    # Content
    - content.code.copy           # Copy button on code blocks
    - content.code.annotate       # Code annotations
    - content.tabs.link           # Linked content tabs
    - content.tooltips            # Inline tooltips

# ─── NAVIGATION ─────────────────────────────────────────────────────
# Left sidebar order: Home → About Me → Laboratory Works (Lab 1-5)
nav:
  - Home: index.md
  - About Me: about.md
  - Laboratory Works:
      - Overview: laboratory/index.md
      - Lab 1: laboratory/lab1.md
      - Lab 2: laboratory/lab2.md
      - Lab 3: laboratory/lab3.md
      - Lab 4: laboratory/lab4.md
      - Lab 5: laboratory/lab5.md

# ─── PLUGINS ────────────────────────────────────────────────────────
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true

# ─── MARKDOWN EXTENSIONS ────────────────────────────────────────────
markdown_extensions:
  # Syntax highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Content enhancements
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true

  # Admonitions (callout blocks)
  - admonition

  # Footnotes & metadata
  - footnotes
  - meta

  # Tables & abbreviations
  - tables
  - abbr
  - attr_list
  - def_list
  - md_in_html

  # Table of contents
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

  # Emoji
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

