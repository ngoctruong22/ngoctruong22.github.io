on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-and-publish-site
        cubes:
          - name: build-and-deploy
            image: docker.io/library/python:3.13-slim
            script:
              - apt-get update && apt-get install -y git
              - pip install -r requirements.txt
              - mkdocs build -f source/mkdocs.yml -d source/site
              - git config user.email "ci@sourcecraft"
              - git config user.name "CI Bot"
              - cp -r source/site /tmp/site_build
              - git checkout release || git checkout -b release
              - rm -rf source/site
              - mkdir -p source/site
              - cp -r /tmp/site_build/* source/site/
              - git add -A source/site
              - git commit -m "Auto deploy MkDocs site" || echo "nothing to commit"
              - git push origin release -f