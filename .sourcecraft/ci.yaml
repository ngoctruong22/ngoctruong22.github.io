on:
  push:
    workflows: build-site
    filter:
      branches: main
workflows:
  build-site:
    tasks:
      - name: build-site
        cubes:
          - name: install-and-build
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - pip install -r source/requirements.txt
              - mkdocs build -f source/mkdocs.yml -d source/site
              - ls -la source/site
          - name: publish-site
            script:
              - git checkout -b release || git checkout release
              - git add source/site
              - "git commit -m 'feat: release'"
              - git push origin release -f